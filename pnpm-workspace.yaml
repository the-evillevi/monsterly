# Approve dependency build scripts. Under CI=true (e.g. Cloudflare Pages) pnpm 11
# escalates an unapproved build script to a hard error (ERR_PNPM_IGNORED_BUILDS).
# esbuild is the only build-script dependency in our tree. This is the location
# pnpm 11 reads; the `pnpm` field in package.json is ignored.
allowBuilds:
  esbuild: true

overrides:
  fast-uri@3.1.3: 4.1.0
  ws@8.20.1: 8.21.0
